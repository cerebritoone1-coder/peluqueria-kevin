{% extends "base.html" %}
{% block title %}Login - Peluquería{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header bg-success text-white text-center">
                <h4><i class="fas fa-sign-in-alt"></i> Iniciar Sesión</h4>
            </div>
            <div class="card-body">
                <form method="POST" action="{{ url_for('auth.login') }}">
                    <div class="mb-3">
                        <label for="telefono" class="form-label">Número de teléfono</label>
                        <input type="tel" class="form-control" id="telefono" name="telefono" placeholder="8095555555" required>
                        <small class="text-muted">Ingresa tu número de teléfono con el que te registraste</small>
                    </div>
                    <button type="submit" class="btn btn-success w-100">Entrar</button>
                </form>
                <div class="text-center mt-3">
                    <p>¿No tienes cuenta? <a href="{{ url_for('auth.registro') }}">Regístrate aquí</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
